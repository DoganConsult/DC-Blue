tunnel: 776305e9-5037-4f7a-9fb3-63c58492622c
credentials-file: /root/.cloudflared/776305e9-5037-4f7a-9fb3-63c58492622c.json

ingress:
  # Main website - serves both API and frontend
  - hostname: doganconsult.com
    service: http://localhost:4000
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s
      tcpKeepAlive: 30s
      keepAliveConnections: 100
      keepAliveTimeout: 90s

  # WWW subdomain
  - hostname: www.doganconsult.com
    service: http://localhost:4000
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s
      tcpKeepAlive: 30s

  # API subdomain (optional - can be same as main)
  - hostname: api.doganconsult.com
    service: http://localhost:4000
    originRequest:
      noTLSVerify: true
      httpHostHeader: "api.doganconsult.com"

  # Health check endpoint
  - hostname: health.doganconsult.com
    service: http://localhost:4000
    path: /health
    originRequest:
      noTLSVerify: true

  # Catch-all rule
  - service: http_status:404