# Nginx: proxy port 80/443 → Node app (doganconsult.com)
# Port: use 5500 if you deploy with scripts/deploy.sh (PM2); else 4000.
# Install: sudo apt-get install -y nginx
# Enable:  sudo ln -sf /root/DoganConsultHup/docs/nginx-doganconsult.conf /etc/nginx/sites-enabled/doganconsult
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx
# SSL: use certbot (Let's Encrypt) or Cloudflare Tunnel in front; then add listen 443 ssl and ssl_certificate directives.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name doganconsult.com www.doganconsult.com _;
    location / {
        proxy_pass http://127.0.0.1:5500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-cache" always;
    }

    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        proxy_pass http://127.0.0.1:5500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
}
