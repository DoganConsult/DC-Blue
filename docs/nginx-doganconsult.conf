# Nginx: proxy port 80/443 → Node app (doganconsult.com)
# Port: use 5500 if you deploy with scripts/deploy.sh (PM2); else 4000.
# Install: sudo apt-get install -y nginx
# Enable:  sudo ln -sf /root/DoganConsultHup/docs/nginx-doganconsult.conf /etc/nginx/sites-enabled/doganconsult
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx
# SSL:     sudo apt-get install -y certbot python3-certbot-nginx
#          sudo certbot --nginx -d doganconsult.com -d www.doganconsult.com

upstream dogan_backend {
    server 127.0.0.1:5500;
    keepalive 16;
}

# Redirect HTTP → HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name doganconsult.com www.doganconsult.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name doganconsult.com www.doganconsult.com;

    # SSL — managed by certbot (paths updated after `certbot --nginx`)
    # ssl_certificate     /etc/letsencrypt/live/doganconsult.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/doganconsult.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml
        image/svg+xml font/woff2;

    # Request size limit
    client_max_body_size 10m;

    # API + health — proxy to Node, no caching
    location /api/ {
        proxy_pass http://dogan_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        add_header Cache-Control "no-store" always;
    }

    location = /health {
        proxy_pass http://dogan_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-store" always;
    }

    # Static assets — long cache (Angular uses content hashing)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        proxy_pass http://dogan_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # SPA fallback — proxy everything else to Node (which serves index.html)
    location / {
        proxy_pass http://dogan_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
