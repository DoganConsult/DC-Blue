# Nginx: proxy port 80 → Node app on 4000 (for Cloudflare Tunnel)
# Install: sudo apt-get install -y nginx
# Enable:  sudo ln -sf /root/DoganConsultHup/docs/nginx-doganconsult.conf /etc/nginx/sites-enabled/doganconsult
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name doganconsult.com www.doganconsult.com _;
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
